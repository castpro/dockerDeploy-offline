# 필수 events 블록 추가
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;
        server_name _;

        location / {
            root   /usr/share/nginx/html;  # 빌드된 React 파일 경로
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;  # React Router 처리를 위해 fallback
        }

        # 추가적인 설정 (예: gzip, 캐시 등) 
    }
}
